<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NKANSAHCARVINGS | Admin Dashboard</title>

  <!-- Supabase v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ---------------- Reset & Fonts ---------------- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f4f4;
      color: #222;
      padding: 20px;
    }

    h2, h3 { margin-bottom: 15px; text-align: center; }
    
    /* ---------------- Login & Admin Sections ---------------- */
    #login-section, #admin-section {
      background: #fff;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: 30px auto;
    }

    input, textarea, button {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea { resize: none; min-height: 80px; }

    button {
      background-color: #d4af37;
      color: #111;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { background-color: #b5942f; }

    #login-btn { background-color: #111; color: #fff; }
    #login-btn:hover { background-color: #333; }
    #logout-btn { background-color: #ff4d4f; color: #fff; margin-top: 15px; }
    #logout-btn:hover { background-color: #d93638; }

    /* ---------------- Messages ---------------- */
    #message, #login-message {
      margin: 10px 0;
      font-weight: 600;
      text-align: center;
    }

    /* ---------------- Artwork List ---------------- */
    #artworks-container {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .artwork {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      text-align: center;
      transition: 0.3s ease;
    }

    .artwork:hover { transform: translateY(-3px); }

    .artwork img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .artwork p {
      margin: 5px 0;
      font-size: 14px;
      color: #333;
    }

    .artwork .price {
      font-weight: 600;
      color: #d4af37;
    }

    .artwork button {
      background-color: #ff4d4f;
      color: #fff;
      font-size: 13px;
      padding: 6px 12px;
      margin-top: 6px;
    }

    .artwork button:hover { background-color: #d93638; }

    /* ---------------- Responsive ---------------- */
    @media (max-width: 600px) {
      #login-section, #admin-section { padding: 20px; }
      .artwork img { width: 100%; height: auto; }
    }
  </style>
</head>
<body>

<h2>NKANSAHCARVINGS | Admin Dashboard</h2>

<!-- LOGIN -->
<div id="login-section">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <button id="login-btn">Login</button>
  <div id="login-message"></div>
</div>

<!-- ADMIN -->
<div id="admin-section" style="display:none;">
  <h3>Add Artwork</h3>

  <form id="artwork-form">
    <label>Upload Image:</label>
    <input type="file" id="image_file" accept="image/*" required>

    <label>Description:</label>
    <textarea id="description" required></textarea>

    <label>Price (₵):</label>
    <input type="number" id="price" required>

    <button type="submit">Add Artwork</button>
  </form>

  <div id="message"></div>

  <h3>Artworks List</h3>
  <div id="artworks-container"></div>

  <button id="logout-btn">Logout</button>
</div>

<script>
  // 🔐 REPLACE WITH YOUR KEYS
  const SUPABASE_URL = "https://pehkrfaxmsrlwzoyoqwn.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGtyZmF4bXNybHd6b3lvcXduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODkyOTQsImV4cCI6MjA4ODA2NTI5NH0.vXdhCFAMU0FlfaLRgMJohg0lXEb-XnBUEfxzRAIr50U";

  const { createClient } = supabase;
  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loginSection = document.getElementById("login-section");
  const adminSection = document.getElementById("admin-section");
  const loginBtn = document.getElementById("login-btn");
  const logoutBtn = document.getElementById("logout-btn");
  const loginMessage = document.getElementById("login-message");
  const form = document.getElementById("artwork-form");
  const message = document.getElementById("message");
  const container = document.getElementById("artworks-container");

  // 🔐 LOGIN
  loginBtn.addEventListener("click", async () => {
    loginMessage.textContent = "Logging in...";
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      loginMessage.textContent = error.message;
      loginMessage.style.color = "red";
      return;
    }

    loginSection.style.display = "none";
    adminSection.style.display = "block";
    fetchArtworks();
  });

  // 🚪 LOGOUT
  logoutBtn.addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    loginSection.style.display = "block";
    adminSection.style.display = "none";
  });

  // ➕ ADD ARTWORK
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    message.textContent = "Uploading...";
    message.style.color = "black";

    const file = document.getElementById("image_file").files[0];
    const description = document.getElementById("description").value.trim();
    const price = parseFloat(document.getElementById("price").value);

    if (!file || !description || isNaN(price)) {
      message.textContent = "Please fill all fields correctly.";
      message.style.color = "red";
      return;
    }

    const fileName = `${Date.now()}_${file.name}`;

    // Upload image
    const { data: uploadData, error: uploadError } = await supabaseClient.storage
      .from("artworks")
      .upload(fileName, file);

    if (uploadError) {
      message.textContent = "Upload error: " + uploadError.message;
      message.style.color = "red";
      return;
    }

    // Get public URL
    const { data: urlData } = supabaseClient.storage
      .from("artworks")
      .getPublicUrl(fileName);

    const imageUrl = urlData?.publicUrl;

    if (!imageUrl) {
      message.textContent = "Error getting public URL.";
      message.style.color = "red";
      return;
    }

    // Insert into database
    const { error: dbError } = await supabaseClient
      .from("artworks")
      .insert([{ image_url: imageUrl, description, price }]);

    if (dbError) {
      message.textContent = "Database insert error: " + dbError.message;
      message.style.color = "red";
      return;
    }

    message.textContent = "Artwork added successfully!";
    message.style.color = "green";
    form.reset();
    fetchArtworks();
  });

  // 📦 FETCH ARTWORKS
  async function fetchArtworks() {
    const { data, error } = await supabaseClient
      .from("artworks")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      console.error(error);
      return;
    }

    container.innerHTML = "";

    data.forEach((art) => {
      const div = document.createElement("div");
      div.className = "artwork";
      div.innerHTML = `
        <img src="${art.image_url}" />
        <p>${art.description}</p>
        <p class="price">₵${art.price}</p>
        <button onclick="deleteArtwork('${art.id}')">Delete</button>
      `;
      container.appendChild(div);
    });
  }

  // ❌ DELETE
  async function deleteArtwork(id) {
    if (!confirm("Delete this artwork?")) return;
    await supabaseClient.from("artworks").delete().eq("id", id);
    fetchArtworks();
  }

  // 🔄 AUTO SESSION CHECK
  supabaseClient.auth.getSession().then(({ data }) => {
    if (data.session) {
      loginSection.style.display = "none";
      adminSection.style.display = "block";
      fetchArtworks();
    }
  });
</script>

</body>
</html>
